name: Create Release From Tag

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate and prepare assets
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_VERSION="${GITHUB_REF_NAME}"

          WEBRTC_BUILD_TAG="m${RELEASE_VERSION}"
          SDK_URL="https://github.com/shiguredo-webrtc-build/webrtc-build/releases/download/m${WEBRTC_BUILD_TAG}/webrtc.android_sdk.tar.gz"

          mkdir -p dist
          curl -fsSL -o dist/webrtc.android_sdk.tar.gz "${SDK_URL}"
          tar -xzf dist/webrtc.android_sdk.tar.gz -C dist

          cp dist/webrtc/aar/libwebrtc.aar dist/libwebrtc.aar
          cp dist/webrtc/NOTICE dist/NOTICE

          cat > dist/release-notes.md <<EOF
${SDK_URL}
EOF

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: false
          body_path: dist/release-notes.md
          files: |
            dist/libwebrtc.aar
            dist/NOTICE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
